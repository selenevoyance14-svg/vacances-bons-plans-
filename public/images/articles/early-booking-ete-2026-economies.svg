<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="100" cy="100" r="200" fill="#10B981" opacity="0.1"/>
  <circle cx="1100" cy="530" r="180" fill="#34D399" opacity="0.08"/>
  <rect x="800" y="-50" width="300" height="300" rx="30" fill="#059669" opacity="0.12" transform="rotate(30 950 100)"/>
  <!-- Calendar icon -->
  <g transform="translate(200, 250)">
    <!-- Calendar body -->
    <rect x="-80" y="-60" width="160" height="150" rx="12" fill="#ECFDF5" opacity="0.95"/>
    <rect x="-80" y="-60" width="160" height="40" rx="12" fill="#059669" opacity="0.9"/>
    <rect x="-80" y="-30" width="160" height="10" fill="#059669" opacity="0.9"/>
    <!-- Calendar rings -->
    <rect x="-50" y="-75" width="12" height="30" rx="4" fill="#6EE7B7"/>
    <rect x="38" y="-75" width="12" height="30" rx="4" fill="#6EE7B7"/>
    <!-- Calendar dates -->
    <text x="-55" y="10" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">1</text>
    <text x="-20" y="10" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">2</text>
    <text x="15" y="10" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">3</text>
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">4</text>
    <text x="-55" y="45" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">5</text>
    <text x="-20" y="45" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">6</text>
    <text x="15" y="45" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">7</text>
    <text x="50" y="45" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">8</text>
    <!-- Circled date -->
    <circle cx="15" cy="38" r="18" fill="none" stroke="#DC2626" stroke-width="3" opacity="0.8"/>
    <text x="-55" y="78" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">9</text>
    <text x="-20" y="78" font-family="Arial, sans-serif" font-size="18" fill="#065F46" opacity="0.5">10</text>
  </g>
  <!-- Coins stack -->
  <g transform="translate(200, 480)">
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="#FCD34D" opacity="0.9"/>
    <rect x="-35" y="-15" width="70" height="15" fill="#F59E0B" opacity="0.85"/>
    <ellipse cx="0" cy="-15" rx="35" ry="12" fill="#FCD34D" opacity="0.9"/>
    <rect x="-35" y="-30" width="70" height="15" fill="#F59E0B" opacity="0.85"/>
    <ellipse cx="0" cy="-30" rx="35" ry="12" fill="#FBBF24" opacity="0.95"/>
    <text x="0" y="-25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400E" text-anchor="middle">&#8364;</text>
  </g>
  <!-- Percentage symbol -->
  <g transform="translate(1000, 350)">
    <circle cx="-30" cy="-30" r="22" fill="none" stroke="#6EE7B7" stroke-width="6" opacity="0.8"/>
    <circle cx="30" cy="30" r="22" fill="none" stroke="#6EE7B7" stroke-width="6" opacity="0.8"/>
    <line x1="-35" y1="40" x2="35" y2="-40" stroke="#6EE7B7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Down arrow (savings) -->
  <g transform="translate(1000, 480)">
    <polygon points="0,35 -25,5 -12,5 -12,-35 12,-35 12,5 25,5" fill="#34D399" opacity="0.7"/>
  </g>
  <!-- Main text -->
  <text x="600" y="220" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Early Booking Ete 2026</text>
  <!-- Discount badge -->
  <rect x="440" y="260" width="320" height="85" rx="42" fill="#F59E0B" opacity="0.95"/>
  <text x="600" y="318" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Jusqu'a -30%</text>
  <!-- Subtitle -->
  <text x="600" y="420" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#A7F3D0" text-anchor="middle">Reservez tot, payez moins cher</text>
  <!-- Checkmark badges -->
  <g transform="translate(430, 490)">
    <circle cx="0" cy="0" r="14" fill="#34D399" opacity="0.8"/>
    <polyline points="-6,0 -2,5 8,-5" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="5" font-family="Arial, sans-serif" font-size="20" fill="#D1FAE5">Annulation gratuite</text>
  </g>
  <g transform="translate(430, 530)">
    <circle cx="0" cy="0" r="14" fill="#34D399" opacity="0.8"/>
    <polyline points="-6,0 -2,5 8,-5" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="5" font-family="Arial, sans-serif" font-size="20" fill="#D1FAE5">Prix bloques</text>
  </g>
</svg>
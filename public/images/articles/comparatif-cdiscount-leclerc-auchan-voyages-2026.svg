<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Comparison cards -->
  <rect x="80" y="180" width="300" height="280" rx="16" fill="white" opacity="0.15"/>
  <rect x="450" y="160" width="300" height="300" rx="16" fill="white" opacity="0.2"/>
  <rect x="820" y="180" width="300" height="280" rx="16" fill="white" opacity="0.15"/>
  <!-- Card labels -->
  <text x="230" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Cdiscount</text>
  <text x="230" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd">Voyage</text>
  <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Leclerc</text>
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd">Voyages</text>
  <text x="970" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Auchan</text>
  <text x="970" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd">Voyages</text>
  <!-- Stars -->
  <text x="230" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#fbbf24">★★★★☆</text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#fbbf24">★★★★★</text>
  <text x="970" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#fbbf24">★★★★☆</text>
  <!-- Check marks -->
  <text x="230" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a5f3fc">Prix agressifs</text>
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a5f3fc">Confiance</text>
  <text x="970" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a5f3fc">Carte fidelite</text>
  <!-- VS -->
  <text x="390" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">VS</text>
  <text x="770" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">VS</text>
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Comparatif Voyagistes 2026</text>
  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#c4b5fd">Quel site choisir ?</text>
  <!-- Bottom -->
  <rect x="400" y="520" width="400" height="50" rx="25" fill="#f59e0b"/>
  <text x="600" y="554" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Notre avis complet</text>
</svg>
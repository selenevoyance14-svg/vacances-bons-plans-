<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b1a1a;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#c0392b;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#e8e8e8;stop-opacity:0.6"/>
      <stop offset="75%" style="stop-color:#27ae60;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e8449;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5530;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a20;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Overlay for readability -->
  <rect width="1200" height="630" fill="black" opacity="0.2"/>
  <!-- Mountains -->
  <polygon points="0,380 100,250 200,310 350,200 500,280 600,220 750,300 850,240 950,310 1050,260 1150,300 1200,250 1200,400 0,400" fill="url(#mountain)" opacity="0.8"/>
  <polygon points="0,420 80,350 180,380 300,310 420,370 520,330 650,390 750,340 850,380 950,350 1050,380 1150,360 1200,370 1200,430 0,430" fill="#2c5530" opacity="0.7"/>
  <!-- Sea -->
  <rect x="0" y="460" width="1200" height="170" fill="url(#sea)"/>
  <!-- Beach strip -->
  <rect x="0" y="440" width="1200" height="25" fill="#d4a847" opacity="0.3"/>
  <!-- Waves -->
  <path d="M0,490 Q60,475 120,490 Q180,505 240,490 Q300,475 360,490 Q420,505 480,490 Q540,475 600,490 Q660,505 720,490 Q780,475 840,490 Q900,505 960,490 Q1020,475 1080,490 Q1140,505 1200,490" fill="none" stroke="white" stroke-width="2.5" opacity="0.3"/>
  <path d="M0,525 Q50,512 100,525 Q150,538 200,525 Q250,512 300,525 Q350,538 400,525 Q450,512 500,525 Q550,538 600,525 Q650,512 700,525 Q750,538 800,525 Q850,512 900,525 Q950,538 1000,525 Q1050,512 1100,525 Q1150,538 1200,525" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- Surfboard -->
  <g transform="translate(900, 280) rotate(-15)">
    <ellipse cx="0" cy="0" rx="15" ry="80" fill="white" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="12" ry="75" fill="none" stroke="#c0392b" stroke-width="2"/>
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#27ae60" stroke-width="2" opacity="0.6"/>
    <!-- Fin -->
    <polygon points="-5,68 5,68 0,82" fill="#c0392b" opacity="0.7"/>
  </g>
  <!-- Pelota ball -->
  <circle cx="1050" cy="200" r="25" fill="white" opacity="0.9"/>
  <circle cx="1050" cy="200" r="25" fill="none" stroke="#c0392b" stroke-width="2"/>
  <path d="M1030,185 Q1050,200 1030,215" fill="none" stroke="#c0392b" stroke-width="2"/>
  <path d="M1070,185 Q1050,200 1070,215" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- Basque cross (Lauburu) simplified -->
  <g transform="translate(1050, 100)" opacity="0.25" fill="white">
    <path d="M0,-5 Q15,-5 15,-20 Q15,-5 30,-5 Q15,-5 15,10 Q15,-5 0,-5 Z"/>
  </g>
  <!-- Wave on surfboard area -->
  <path d="M820,380 Q860,360 900,380 Q940,400 980,380 Q1020,360 1060,380" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Geometric decorations -->
  <rect x="60" y="450" width="10" height="10" fill="white" opacity="0.15" transform="rotate(45,65,455)"/>
  <rect x="1130" y="500" width="8" height="8" fill="white" opacity="0.12" transform="rotate(45,1134,504)"/>
  <!-- Basque flag inspired stripes -->
  <line x1="0" y1="0" x2="200" y2="200" stroke="white" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="40" x2="240" y2="200" stroke="white" stroke-width="1" opacity="0.06"/>
  <line x1="40" y1="0" x2="200" y2="160" stroke="white" stroke-width="1" opacity="0.06"/>
  <!-- Red/Green accent bars -->
  <rect x="80" y="520" width="200" height="3" rx="1.5" fill="#c0392b" opacity="0.4"/>
  <rect x="80" y="528" width="200" height="3" rx="1.5" fill="#27ae60" opacity="0.4"/>
  <!-- Text -->
  <text x="80" y="160" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="bold" fill="white" letter-spacing="5">PAYS BASQUE</text>
  <rect x="80" y="178" width="350" height="4" rx="2" fill="white" opacity="0.5"/>
  <text x="80" y="245" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="white" opacity="0.9" letter-spacing="4">Surf &amp; Culture</text>
  <!-- Badge -->
  <rect x="80" y="270" width="120" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="140" y="292" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">2026</text>
</svg>
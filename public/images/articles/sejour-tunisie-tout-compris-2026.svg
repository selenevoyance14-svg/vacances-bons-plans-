<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a03c"/>
      <stop offset="40%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#1abc9c"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a085;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0e6655;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#d4a03c;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sand dunes -->
  <path d="M0,520 Q200,460 400,490 Q600,520 800,480 Q1000,440 1200,480 L1200,630 L0,630 Z" fill="url(#sand)"/>
  <!-- Sea -->
  <path d="M0,530 Q300,500 600,520 Q900,540 1200,510 L1200,630 L0,630 Z" fill="url(#sea)"/>
  <!-- Palm tree -->
  <g transform="translate(120, 150)">
    <rect x="25" y="100" width="16" height="250" rx="5" fill="#5d4037" opacity="0.7"/>
    <!-- Leaves -->
    <path d="M33,100 Q-40,50 -80,80" stroke="#27ae60" stroke-width="8" fill="none" opacity="0.6"/>
    <path d="M33,100 Q-30,30 -60,20" stroke="#2ecc71" stroke-width="7" fill="none" opacity="0.6"/>
    <path d="M33,100 Q100,30 140,40" stroke="#27ae60" stroke-width="8" fill="none" opacity="0.6"/>
    <path d="M33,100 Q110,50 150,80" stroke="#2ecc71" stroke-width="7" fill="none" opacity="0.6"/>
    <path d="M33,100 Q33,30 50,10" stroke="#27ae60" stroke-width="6" fill="none" opacity="0.6"/>
    <path d="M33,100 Q80,60 120,90" stroke="#2ecc71" stroke-width="6" fill="none" opacity="0.5"/>
    <path d="M33,100 Q-20,70 -50,60" stroke="#2ecc71" stroke-width="6" fill="none" opacity="0.5"/>
  </g>
  <!-- Mosque dome silhouette -->
  <g transform="translate(850, 200)" opacity="0.2">
    <rect x="0" y="80" width="200" height="180" fill="#2c3e50"/>
    <ellipse cx="100" cy="80" rx="80" ry="60" fill="#2c3e50"/>
    <!-- Crescent on top -->
    <circle cx="100" cy="30" r="15" fill="#2c3e50"/>
    <circle cx="108" cy="28" r="12" fill="#d4a03c"/>
    <!-- Minaret -->
    <rect x="-30" y="40" width="25" height="220" fill="#2c3e50"/>
    <polygon points="-30,40 -17,0 -5,40" fill="#2c3e50"/>
    <rect x="205" y="60" width="25" height="200" fill="#2c3e50"/>
    <polygon points="205,60 217,20 230,60" fill="#2c3e50"/>
  </g>
  <!-- Sun -->
  <circle cx="600" cy="80" r="60" fill="#f39c12" opacity="0.8"/>
  <circle cx="600" cy="80" r="45" fill="#f1c40f" opacity="0.9"/>
  <!-- Decorative geometric pattern -->
  <g opacity="0.1" fill="#fff">
    <polygon points="550,450 570,430 590,450 570,470"/>
    <polygon points="600,450 620,430 640,450 620,470"/>
    <polygon points="650,450 670,430 690,450 670,470"/>
  </g>
  <!-- Text -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fff">
    Tunisie Tout Compris
  </text>
  <rect x="430" y="330" width="340" height="70" rx="35" fill="#0e6655" opacity="0.85"/>
  <text x="600" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#fff">
    Des 329&#8364;
  </text>
  <!-- Decorative lines -->
  <rect x="420" y="260" width="360" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="470" y="410" width="260" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
</svg>
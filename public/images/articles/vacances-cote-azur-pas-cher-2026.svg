<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#2e86c1;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#5dade2;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#d4a847;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c39bd3;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e547;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="palm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e8449;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="1000" cy="130" r="65" fill="url(#sun)"/>
  <circle cx="1000" cy="130" r="80" fill="none" stroke="#f9e547" stroke-width="2" opacity="0.3"/>
  <circle cx="1000" cy="130" r="95" fill="none" stroke="#f9e547" stroke-width="1" opacity="0.15"/>
  <!-- Sun glow -->
  <circle cx="1000" cy="130" r="120" fill="#f9e547" opacity="0.08"/>
  <!-- Mediterranean coast -->
  <path d="M0,420 Q100,400 200,415 Q350,440 500,410 Q650,380 800,400 Q900,415 1000,395 Q1100,380 1200,400 L1200,460 L0,460 Z" fill="#d4a847" opacity="0.3"/>
  <path d="M0,440 Q150,425 300,440 Q450,460 600,435 Q750,420 900,440 Q1050,455 1200,435 L1200,470 L0,470 Z" fill="#c4985a" opacity="0.4"/>
  <!-- Sea -->
  <rect x="0" y="460" width="1200" height="170" fill="url(#sea)"/>
  <!-- Waves -->
  <path d="M0,485 Q50,472 100,485 Q150,498 200,485 Q250,472 300,485 Q350,498 400,485 Q450,472 500,485 Q550,498 600,485 Q650,472 700,485 Q750,498 800,485 Q850,472 900,485 Q950,498 1000,485 Q1050,472 1100,485 Q1150,498 1200,485" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <path d="M0,515 Q40,505 80,515 Q120,525 160,515 Q200,505 240,515 Q280,525 320,515 Q360,505 400,515 Q440,525 480,515 Q520,505 560,515 Q600,525 640,515 Q680,505 720,515 Q760,525 800,515 Q840,505 880,515 Q920,525 960,515 Q1000,505 1040,515 Q1080,525 1120,515 Q1160,505 1200,515" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- Palm tree trunk -->
  <path d="M180,430 Q185,350 175,250 Q170,200 178,160" stroke="#8B6914" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M180,430 Q185,350 175,250 Q170,200 178,160" stroke="#9B7924" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Palm leaves -->
  <path d="M178,160 Q130,120 60,130" stroke="#27ae60" stroke-width="4" fill="none"/>
  <path d="M178,160 Q140,100 80,80" stroke="#27ae60" stroke-width="4" fill="none"/>
  <path d="M178,160 Q180,90 170,50" stroke="#2ecc71" stroke-width="4" fill="none"/>
  <path d="M178,160 Q220,100 280,80" stroke="#27ae60" stroke-width="4" fill="none"/>
  <path d="M178,160 Q230,120 300,130" stroke="#27ae60" stroke-width="4" fill="none"/>
  <path d="M178,160 Q210,140 270,155" stroke="#2ecc71" stroke-width="3" fill="none"/>
  <path d="M178,160 Q150,130 100,140" stroke="#2ecc71" stroke-width="3" fill="none"/>
  <!-- Palm leaf details -->
  <path d="M60,130 Q95,125 130,120 M80,80 Q110,90 140,100 M170,50 Q175,75 178,100 M280,80 Q250,90 220,100 M300,130 Q265,128 230,125" stroke="#1e8449" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Yacht silhouette -->
  <g transform="translate(750, 440)">
    <!-- Hull -->
    <path d="M0,20 L20,35 L120,35 L140,20 Q120,40 20,40 Q0,35 0,20 Z" fill="white" opacity="0.9"/>
    <!-- Cabin -->
    <rect x="40" y="8" width="60" height="14" rx="2" fill="white" opacity="0.85"/>
    <!-- Mast -->
    <line x1="70" y1="8" x2="70" y2="-40" stroke="white" stroke-width="2"/>
    <!-- Sail -->
    <polygon points="72,-38 72,6 120,6" fill="white" opacity="0.5"/>
    <polygon points="68,-35 68,6 30,6" fill="white" opacity="0.4"/>
    <!-- Flag -->
    <polygon points="70,-40 70,-48 82,-44" fill="#e74c3c" opacity="0.7"/>
  </g>
  <!-- Geometric decorations -->
  <rect x="50" y="50" width="12" height="12" fill="#f9e547" opacity="0.3" transform="rotate(45,56,56)"/>
  <rect x="350" y="30" width="8" height="8" fill="white" opacity="0.2" transform="rotate(45,354,34)"/>
  <circle cx="1100" cy="300" r="5" fill="white" opacity="0.15"/>
  <circle cx="1140" cy="340" r="3" fill="white" opacity="0.1"/>
  <!-- Lavender dots decoration -->
  <g opacity="0.15" fill="#c39bd3">
    <circle cx="1050" cy="380" r="4"/>
    <circle cx="1065" cy="370" r="4"/>
    <circle cx="1080" cy="360" r="4"/>
    <circle cx="1095" cy="370" r="4"/>
    <circle cx="1110" cy="380" r="4"/>
    <circle cx="1060" cy="395" r="3"/>
    <circle cx="1075" cy="385" r="3"/>
    <circle cx="1090" cy="385" r="3"/>
    <circle cx="1105" cy="395" r="3"/>
  </g>
  <!-- Text -->
  <text x="350" y="180" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="white" letter-spacing="4">COTE D'AZUR</text>
  <rect x="350" y="198" width="320" height="4" rx="2" fill="#f0a500" opacity="0.7"/>
  <text x="350" y="260" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="white" opacity="0.9" letter-spacing="3">Des 35&#8364;/nuit</text>
  <!-- Price badge -->
  <rect x="350" y="285" width="160" height="36" rx="18" fill="#f0a500" opacity="0.35"/>
  <text x="430" y="310" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">BON PLAN 2026</text>
</svg>
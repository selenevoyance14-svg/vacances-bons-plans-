<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#FDE047"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background (sky to sunshine) -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="200" cy="80" rx="60" ry="25" fill="#FFFFFF"/>
    <ellipse cx="240" cy="75" rx="45" ry="22" fill="#FFFFFF"/>
    <ellipse cx="170" cy="85" rx="35" ry="18" fill="#FFFFFF"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="900" cy="60" rx="50" ry="20" fill="#FFFFFF"/>
    <ellipse cx="935" cy="55" rx="40" ry="18" fill="#FFFFFF"/>
  </g>
  <!-- Sun -->
  <circle cx="1050" cy="130" r="70" fill="#FCD34D" opacity="0.9"/>
  <circle cx="1050" cy="130" r="55" fill="#FBBF24"/>
  <!-- Sun rays -->
  <line x1="1050" y1="40" x2="1050" y2="20" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <line x1="1120" y1="65" x2="1135" y2="52" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <line x1="1140" y1="130" x2="1160" y2="130" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <line x1="1120" y1="195" x2="1135" y2="208" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <line x1="980" y1="65" x2="965" y2="52" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <line x1="960" y1="130" x2="940" y2="130" stroke="#FCD34D" stroke-width="4" opacity="0.5"/>
  <!-- Sea -->
  <rect x="0" y="420" width="1200" height="60" fill="#38BDF8" opacity="0.6"/>
  <path d="M0,420 Q40,410 80,420 Q120,430 160,420 Q200,410 240,420 Q280,430 320,420 Q360,410 400,420 Q440,430 480,420 Q520,410 560,420 Q600,430 640,420 Q680,410 720,420 Q760,430 800,420 Q840,410 880,420 Q920,430 960,420 Q1000,410 1040,420 Q1080,430 1120,420 Q1160,410 1200,420 L1200,440 L0,440 Z" fill="#7DD3FC" opacity="0.5"/>
  <!-- Beach sand -->
  <path d="M0,470 Q200,455 400,465 Q600,475 800,460 Q1000,450 1200,465 L1200,630 L0,630 Z" fill="url(#sand)" opacity="0.9"/>
  <!-- Beach umbrella -->
  <g transform="translate(250, 380)">
    <!-- Pole -->
    <rect x="-4" y="-80" width="8" height="180" fill="#92400E" opacity="0.8"/>
    <!-- Umbrella top -->
    <path d="M-90,-80 Q-90,-160 0,-160 Q90,-160 90,-80 Z" fill="#EF4444" opacity="0.9"/>
    <path d="M-90,-80 Q-45,-160 0,-80" fill="#FFFFFF" opacity="0.3"/>
    <path d="M0,-80 Q45,-160 90,-80" fill="#FFFFFF" opacity="0.3"/>
    <!-- Umbrella tip -->
    <circle cx="0" cy="-160" r="5" fill="#B91C1C"/>
  </g>
  <!-- Sandcastle -->
  <g transform="translate(900, 520)">
    <!-- Base -->
    <rect x="-50" y="-20" width="100" height="40" rx="3" fill="#D4A574" opacity="0.9"/>
    <!-- Tower left -->
    <rect x="-45" y="-55" width="30" height="35" rx="2" fill="#D4A574" opacity="0.9"/>
    <!-- Tower right -->
    <rect x="15" y="-55" width="30" height="35" rx="2" fill="#D4A574" opacity="0.9"/>
    <!-- Battlement left -->
    <rect x="-45" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <rect x="-30" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <rect x="-15" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <!-- Battlement right -->
    <rect x="15" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <rect x="30" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <rect x="45" y="-65" width="8" height="10" fill="#D4A574" opacity="0.9"/>
    <!-- Door -->
    <path d="M-8,20 L-8,0 Q0,-10 8,0 L8,20 Z" fill="#92400E" opacity="0.6"/>
    <!-- Flag -->
    <line x1="0" y1="-55" x2="0" y2="-85" stroke="#92400E" stroke-width="2"/>
    <polygon points="0,-85 20,-78 0,-70" fill="#EF4444" opacity="0.8"/>
  </g>
  <!-- Family silhouette -->
  <g transform="translate(550, 400)">
    <!-- Adult 1 (left) -->
    <circle cx="-60" cy="-90" r="18" fill="#1E3A5F" opacity="0.85"/>
    <rect x="-72" y="-72" width="24" height="55" rx="8" fill="#1E3A5F" opacity="0.85"/>
    <rect x="-70" y="-20" width="9" height="40" rx="4" fill="#1E3A5F" opacity="0.85"/>
    <rect x="-55" y="-20" width="9" height="40" rx="4" fill="#1E3A5F" opacity="0.85"/>
    <!-- Kid 1 -->
    <circle cx="-20" cy="-60" r="14" fill="#1E3A5F" opacity="0.8"/>
    <rect x="-30" y="-46" width="20" height="38" rx="6" fill="#1E3A5F" opacity="0.8"/>
    <rect x="-28" y="-10" width="7" height="30" rx="3" fill="#1E3A5F" opacity="0.8"/>
    <rect x="-17" y="-10" width="7" height="30" rx="3" fill="#1E3A5F" opacity="0.8"/>
    <!-- Kid 2 -->
    <circle cx="20" cy="-55" r="12" fill="#1E3A5F" opacity="0.8"/>
    <rect x="12" y="-43" width="16" height="32" rx="5" fill="#1E3A5F" opacity="0.8"/>
    <rect x="13" y="-13" width="6" height="28" rx="3" fill="#1E3A5F" opacity="0.8"/>
    <rect x="22" y="-13" width="6" height="28" rx="3" fill="#1E3A5F" opacity="0.8"/>
    <!-- Adult 2 (right) -->
    <circle cx="60" cy="-85" r="17" fill="#1E3A5F" opacity="0.85"/>
    <rect x="48" y="-68" width="24" height="50" rx="8" fill="#1E3A5F" opacity="0.85"/>
    <rect x="50" y="-20" width="9" height="38" rx="4" fill="#1E3A5F" opacity="0.85"/>
    <rect x="63" y="-20" width="9" height="38" rx="4" fill="#1E3A5F" opacity="0.85"/>
    <!-- Holding hands lines -->
    <line x1="-48" y1="-45" x2="-30" y2="-30" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="28" y1="-28" x2="48" y2="-42" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Main text -->
  <text x="600" y="180" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#1E3A5F" text-anchor="middle">Vacances en Famille</text>
  <!-- Subtitle badge -->
  <rect x="440" y="210" width="320" height="70" rx="35" fill="#F59E0B" opacity="0.95"/>
  <text x="600" y="258" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Ete 2026</text>
  <!-- Bottom text -->
  <text x="600" y="600" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#92400E" text-anchor="middle">Les meilleures destinations pour petits et grands</text>
</svg>
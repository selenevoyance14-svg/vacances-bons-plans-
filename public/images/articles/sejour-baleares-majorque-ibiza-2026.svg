<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="50%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#e91e90"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00acc1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#006064;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="beach" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Beach sand -->
  <ellipse cx="200" cy="550" rx="300" ry="120" fill="url(#beach)" opacity="0.5"/>
  <ellipse cx="1000" cy="570" rx="280" ry="100" fill="url(#beach)" opacity="0.4"/>
  <!-- Crystal water -->
  <path d="M0,440 Q200,410 400,440 Q600,470 800,430 Q1000,400 1200,440 L1200,630 L0,630 Z" fill="url(#water)"/>
  <path d="M0,480 Q300,460 600,480 Q900,500 1200,475 L1200,630 L0,630 Z" fill="#006064" opacity="0.3"/>
  <!-- Water sparkles -->
  <circle cx="300" cy="470" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="500" cy="460" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="700" cy="455" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="900" cy="465" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="400" cy="490" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="600" cy="485" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="800" cy="480" r="2" fill="#fff" opacity="0.4"/>
  <!-- Music notes -->
  <g transform="translate(900, 100)" opacity="0.2" fill="#e91e90">
    <circle cx="0" cy="80" r="15"/>
    <rect x="13" y="0" width="5" height="80"/>
    <path d="M18,0 Q50,-10 40,30 L18,20" fill="#e91e90"/>
  </g>
  <g transform="translate(980, 130)" opacity="0.15" fill="#e91e90">
    <circle cx="0" cy="60" r="12"/>
    <rect x="10" y="0" width="4" height="60"/>
    <path d="M14,0 Q40,-8 32,24 L14,16" fill="#e91e90"/>
  </g>
  <g transform="translate(100, 120)" opacity="0.15" fill="#00bcd4">
    <circle cx="0" cy="60" r="12"/>
    <rect x="10" y="0" width="4" height="60"/>
    <path d="M14,0 Q40,-8 32,24 L14,16" fill="#00bcd4"/>
  </g>
  <!-- DJ booth shape -->
  <g transform="translate(80, 300)" opacity="0.15">
    <rect x="0" y="40" width="120" height="60" rx="8" fill="#4a148c"/>
    <circle cx="35" cy="60" r="18" fill="none" stroke="#e91e90" stroke-width="3"/>
    <circle cx="85" cy="60" r="18" fill="none" stroke="#e91e90" stroke-width="3"/>
    <circle cx="35" cy="60" r="5" fill="#e91e90"/>
    <circle cx="85" cy="60" r="5" fill="#e91e90"/>
    <rect x="50" y="0" width="4" height="40" fill="#4a148c"/>
    <circle cx="52" cy="0" r="6" fill="#e91e90"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="40" fill="#e91e90" opacity="0.15"/>
  <circle cx="1120" cy="60" r="25" fill="#e91e90" opacity="0.1"/>
  <circle cx="50" cy="60" r="30" fill="#00bcd4" opacity="0.2"/>
  <!-- Sun -->
  <circle cx="600" cy="80" r="50" fill="#fff" opacity="0.3"/>
  <circle cx="600" cy="80" r="35" fill="#fff" opacity="0.4"/>
  <!-- Text -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="86" font-weight="bold" fill="#fff" stroke="#006064" stroke-width="2">
    Baleares
  </text>
  <rect x="240" y="290" width="720" height="55" rx="27" fill="#006064" opacity="0.7"/>
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">
    Majorque &#183; Ibiza &#183; Minorque
  </text>
  <!-- Decorative line -->
  <rect x="400" y="220" width="400" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="350" y="355" width="500" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
</svg>
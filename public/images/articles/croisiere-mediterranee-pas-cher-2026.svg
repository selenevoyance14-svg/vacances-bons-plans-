<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sun/Moon -->
  <circle cx="1050" cy="100" r="60" fill="#fbbf24" opacity="0.7"/>
  <!-- Cruise ship -->
  <g transform="translate(200, 300)">
    <!-- Hull -->
    <path d="M0 80 L50 120 L550 120 L600 80 L580 80 Q500 100 300 100 Q100 100 20 80Z" fill="white" opacity="0.95"/>
    <!-- Body -->
    <rect x="60" y="20" width="480" height="60" rx="5" fill="white" opacity="0.9"/>
    <!-- Windows -->
    <rect x="80" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="115" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="150" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="185" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="220" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="255" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="290" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="325" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="360" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="395" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="430" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="465" y="35" width="25" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>
    <!-- Upper deck -->
    <rect x="120" y="-20" width="360" height="40" rx="5" fill="white" opacity="0.85"/>
    <!-- Funnel -->
    <rect x="350" y="-60" width="50" height="45" rx="5" fill="#ef4444"/>
    <rect x="345" y="-65" width="60" height="10" rx="3" fill="#dc2626"/>
  </g>
  <!-- Sea waves -->
  <path d="M0 460 Q150 440 300 460 Q450 480 600 460 Q750 440 900 460 Q1050 480 1200 460 L1200 630 L0 630Z" fill="url(#sea)"/>
  <path d="M0 490 Q200 470 400 490 Q600 510 800 490 Q1000 470 1200 490 L1200 630 L0 630Z" fill="#0c4a6e" opacity="0.5"/>
  <!-- Text -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Croisiere Mediterranee 2026</text>
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#fde68a">MSC, Costa, Royal Caribbean des 349€</text>
</svg>
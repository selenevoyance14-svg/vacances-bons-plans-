<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="40%" stop-color="#D97706"/>
      <stop offset="70%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="600" cy="100" r="90" fill="#FCD34D" opacity="0.9"/>
  <circle cx="600" cy="100" r="72" fill="#FBBF24"/>
  <!-- Sun rays -->
  <line x1="600" y1="-10" x2="600" y2="-30" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="680" y1="25" x2="698" y2="12" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="710" y1="100" x2="735" y2="100" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="680" y1="175" x2="698" y2="188" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="520" y1="25" x2="502" y2="12" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="490" y1="100" x2="465" y2="100" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <line x1="520" y1="175" x2="502" y2="188" stroke="#FCD34D" stroke-width="4" opacity="0.6"/>
  <!-- Sea -->
  <rect x="0" y="400" width="1200" height="230" fill="url(#water)" opacity="0.85"/>
  <!-- Waves -->
  <path d="M0,400 Q40,385 80,400 Q120,415 160,400 Q200,385 240,400 Q280,415 320,400 Q360,385 400,400 Q440,415 480,400 Q520,385 560,400 Q600,415 640,400 Q680,385 720,400 Q760,415 800,400 Q840,385 880,400 Q920,415 960,400 Q1000,385 1040,400 Q1080,415 1120,400 Q1160,385 1200,400 L1200,420 L0,420 Z" fill="#22D3EE" opacity="0.5"/>
  <path d="M0,430 Q50,420 100,430 Q150,440 200,430 Q250,420 300,430 Q350,440 400,430 Q450,420 500,430 Q550,440 600,430 Q650,420 700,430 Q750,440 800,430 Q850,420 900,430 Q950,440 1000,430 Q1050,420 1100,430 Q1150,440 1200,430 L1200,450 L0,450 Z" fill="#0891B2" opacity="0.4"/>
  <!-- Left cliff -->
  <polygon points="0,200 0,630 200,630 180,380 120,350 80,280" fill="url(#cliff)" opacity="0.95"/>
  <polygon points="0,250 50,220 80,280 40,300 0,290" fill="#C8A265" opacity="0.8"/>
  <!-- Rock arch (Algarve famous arch) -->
  <polygon points="850,350 850,630 1050,630 1050,300 1000,280 950,290 900,320" fill="url(#cliff)" opacity="0.95"/>
  <!-- Arch cutout (simulated with overlapping sea color) -->
  <ellipse cx="950" cy="450" rx="60" ry="80" fill="url(#water)" opacity="0.85"/>
  <!-- Right cliff extension -->
  <polygon points="1100,280 1100,630 1200,630 1200,220 1150,250" fill="url(#cliff)" opacity="0.9"/>
  <!-- Small rocks in water -->
  <ellipse cx="300" cy="520" rx="25" ry="15" fill="#B8860B" opacity="0.7"/>
  <ellipse cx="750" cy="540" rx="18" ry="10" fill="#B8860B" opacity="0.6"/>
  <!-- Beach sand -->
  <path d="M200,630 Q300,560 500,580 Q600,590 700,570 Q780,560 850,630 Z" fill="#FDE68A" opacity="0.7"/>
  <!-- Main text -->
  <text x="500" y="300" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="bold" fill="#FFFFFF" text-anchor="middle" stroke="#00000030" stroke-width="1">Portugal Algarve</text>
  <!-- Price badge -->
  <rect x="370" y="320" width="260" height="75" rx="38" fill="#DC2626" opacity="0.95"/>
  <text x="500" y="372" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Des 399&#8364;</text>
  <!-- Subtitle -->
  <text x="500" y="560" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#FEF3C7" text-anchor="middle">Falaises, plages et soleil garanti</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e6b;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#4a6fa5;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#7a8ea8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b0c4cc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a6b8a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2c4a6b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lighthouse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e0d0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4c8b4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lighthouseRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a93226;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Cloud shapes -->
  <g opacity="0.2" fill="white">
    <ellipse cx="200" cy="80" rx="80" ry="30"/>
    <ellipse cx="250" cy="70" rx="60" ry="25"/>
    <ellipse cx="160" cy="75" rx="50" ry="20"/>
    <ellipse cx="700" cy="60" rx="90" ry="28"/>
    <ellipse cx="760" cy="50" rx="60" ry="22"/>
    <ellipse cx="650" cy="55" rx="55" ry="20"/>
  </g>
  <!-- Rocky coast -->
  <polygon points="0,400 40,380 80,395 130,365 180,390 230,370 280,400 340,360 400,385 450,370 500,395 550,375 600,400 650,380 700,410 750,385 800,405 850,375 900,395 950,380 1000,400 1050,390 1100,410 1150,395 1200,380 1200,460 0,460" fill="#5a6b7a"/>
  <polygon points="0,430 60,415 120,440 200,410 280,435 360,420 440,445 520,425 600,450 680,430 760,455 840,435 920,450 1000,440 1080,455 1150,440 1200,450 1200,460 0,460" fill="#4a5a6a"/>
  <!-- Sea -->
  <rect x="0" y="450" width="1200" height="180" fill="url(#sea)"/>
  <!-- Waves -->
  <path d="M0,480 Q50,465 100,480 Q150,495 200,480 Q250,465 300,480 Q350,495 400,480 Q450,465 500,480 Q550,495 600,480 Q650,465 700,480 Q750,495 800,480 Q850,465 900,480 Q950,495 1000,480 Q1050,465 1100,480 Q1150,495 1200,480" fill="none" stroke="white" stroke-width="2.5" opacity="0.35"/>
  <path d="M-20,510 Q30,495 80,510 Q130,525 180,510 Q230,495 280,510 Q330,525 380,510 Q430,495 480,510 Q530,525 580,510 Q630,495 680,510 Q730,525 780,510 Q830,495 880,510 Q930,525 980,510 Q1030,495 1080,510 Q1130,525 1180,510 Q1230,495 1280,510" fill="none" stroke="white" stroke-width="2" opacity="0.25"/>
  <path d="M0,545 Q40,535 80,545 Q120,555 160,545 Q200,535 240,545 Q280,555 320,545 Q360,535 400,545 Q440,555 480,545 Q520,535 560,545 Q600,555 640,545 Q680,535 720,545 Q760,555 800,545 Q840,535 880,545 Q920,555 960,545 Q1000,535 1040,545 Q1080,555 1120,545 Q1160,535 1200,545" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- Lighthouse -->
  <rect x="870" y="180" width="50" height="200" fill="url(#lighthouse)"/>
  <!-- Lighthouse red stripes -->
  <rect x="870" y="210" width="50" height="25" fill="url(#lighthouseRed)"/>
  <rect x="870" y="265" width="50" height="25" fill="url(#lighthouseRed)"/>
  <rect x="870" y="320" width="50" height="25" fill="url(#lighthouseRed)"/>
  <!-- Lighthouse top -->
  <rect x="860" y="170" width="70" height="15" rx="3" fill="#2c3e50"/>
  <polygon points="895,120 860,170 930,170" fill="#2c3e50"/>
  <!-- Lighthouse light -->
  <circle cx="895" cy="155" r="12" fill="#f1c40f" opacity="0.9"/>
  <circle cx="895" cy="155" r="18" fill="#f1c40f" opacity="0.3"/>
  <!-- Light beam -->
  <polygon points="907,150 1100,100 1100,130 907,160" fill="#f1c40f" opacity="0.15"/>
  <polygon points="883,150 700,110 700,140 883,160" fill="#f1c40f" opacity="0.1"/>
  <!-- Lighthouse base -->
  <rect x="855" y="375" width="80" height="15" rx="3" fill="#5a6b7a"/>
  <!-- Celtic knot pattern (decorative border) -->
  <g transform="translate(100, 560)" opacity="0.3" stroke="white" stroke-width="2" fill="none">
    <circle cx="0" cy="0" r="12"/>
    <circle cx="20" cy="0" r="12"/>
    <circle cx="40" cy="0" r="12"/>
    <circle cx="60" cy="0" r="12"/>
    <circle cx="80" cy="0" r="12"/>
    <circle cx="100" cy="0" r="12"/>
    <circle cx="120" cy="0" r="12"/>
    <circle cx="140" cy="0" r="12"/>
    <circle cx="160" cy="0" r="12"/>
    <circle cx="180" cy="0" r="12"/>
    <circle cx="200" cy="0" r="12"/>
    <circle cx="220" cy="0" r="12"/>
    <circle cx="240" cy="0" r="12"/>
    <circle cx="260" cy="0" r="12"/>
    <circle cx="280" cy="0" r="12"/>
    <circle cx="300" cy="0" r="12"/>
  </g>
  <!-- Celtic knot decorative element top-right -->
  <g transform="translate(1050, 50)" opacity="0.25" stroke="white" stroke-width="2" fill="none">
    <circle cx="0" cy="0" r="30"/>
    <circle cx="25" cy="0" r="30"/>
    <circle cx="12" cy="-20" r="30"/>
    <line x1="-20" y1="20" x2="45" y2="20"/>
    <line x1="-20" y1="-35" x2="45" y2="-35"/>
  </g>
  <!-- Geometric diamonds -->
  <rect x="50" y="400" width="10" height="10" fill="white" opacity="0.15" transform="rotate(45,55,405)"/>
  <rect x="1130" y="430" width="8" height="8" fill="white" opacity="0.15" transform="rotate(45,1134,434)"/>
  <!-- Text -->
  <text x="80" y="170" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="bold" fill="white" letter-spacing="5">BRETAGNE</text>
  <rect x="80" y="188" width="400" height="4" rx="2" fill="#b0c4cc" opacity="0.6"/>
  <text x="80" y="250" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="white" opacity="0.9" letter-spacing="4">Bord de Mer</text>
  <!-- Badge -->
  <rect x="80" y="272" width="120" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="140" y="294" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">2026</text>
</svg>